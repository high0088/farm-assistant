<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#356943">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AI농장비서">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>AI 농장비서</title>
<style>
body{margin:0;background:#f5f6f3;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#222;-webkit-font-smoothing:antialiased;}
header{background:#356943;color:white;padding:calc(18px + env(safe-area-inset-top)) 18px 22px;}
header h1{margin:0;font-size:23px;font-weight:700;}
header p{margin:8px 0 0;font-size:14px;line-height:1.5;}
.wrap{max-width:760px;margin:auto;padding:14px;}
.card{background:white;border:1px solid #e1e7de;border-radius:18px;padding:18px;margin-bottom:14px;}
h2{margin:0 0 14px;color:#2f5d3a;font-size:20px;}
label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;}
input,select,textarea{width:100%;padding:14px;border:1px solid #cfd8cc;border-radius:12px;font-size:16px;margin-bottom:12px;box-sizing:border-box;background:#fff;}
textarea{min-height:88px;resize:vertical;}
button{width:100%;border:0;border-radius:14px;padding:14px;font-size:16px;font-weight:700;margin-top:8px;}
.green{background:#356943;color:white}.soft{background:#eef3ec;color:#2f5d3a}.blue{background:#426f9f;color:white}.red{background:#9b4747;color:white}
.notice{background:#fff8de;border:1px solid #eadca7;border-radius:14px;padding:12px;font-size:14px;line-height:1.6;margin-bottom:14px;}
.result{background:#f8faf7;border:1px solid #dde5d9;border-radius:14px;padding:14px;white-space:pre-wrap;line-height:1.65;margin-top:12px;font-size:15px;}
.record{background:#eef4ed;border-radius:13px;padding:12px;margin-top:9px;line-height:1.55;font-size:14px;}
.record.reserve{background:#f8faf7;border:1px solid #dde5d9;}
.actionRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}.actionRow button{font-size:14px;padding:10px}
.calHeader{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.calHeader button{width:auto;padding:10px 13px;font-size:14px}
.monthTitle{font-weight:700;color:#2f5d3a;font-size:17px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dow{text-align:center;font-size:12px;color:#667366;font-weight:700;padding:5px 0}.day{min-height:52px;background:#fafcf8;border:1px solid #dce5d8;border-radius:12px;padding:5px;font-size:13px}.day.selected{border:2px solid #356943;background:#eaf3e8}.day.empty{background:transparent;border:none}.dayNum{font-weight:700}.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#356943;margin-right:2px}.dot.sale{background:#4d75a3}.dot.cost{background:#7656a5}.dot.chem{background:#d58925}
.checkboxBox{background:#f8faf7;border:1px solid #dde5d9;border-radius:14px;padding:12px;margin-top:10px}.checkItem{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #e6ebe3;font-size:14px}.checkItem:last-child{border-bottom:none}.checkItem input{width:20px;height:20px;flex:0 0 20px}.doneText{color:#2f5d3a;font-weight:700;text-decoration:line-through;}
</style>
</head>
<body>
<header><h1>AI 농장비서</h1><p>iPhone 홈화면 추가용</p></header>
<div class="wrap">
<div class="notice">Safari에서 열고 공유 버튼(□↑) → <b>홈 화면에 추가</b>를 누르면 앱처럼 사용할 수 있습니다. 아이폰 음성입력은 입력창에서 키보드 🎤 버튼을 사용하세요.</div>

<div class="card"><h2>① 농장 기본정보</h2>
<label>농장명</label><input id="farmName" placeholder="예: 청년딸기농장">
<label>작목</label><select id="crop"><option>딸기</option><option>토마토</option><option>고추</option><option>포도</option><option>상추</option></select>
<label>특이사항</label><textarea id="memo" placeholder="예: 판매기록 관리 필요"></textarea>
<button class="green" onclick="saveProfile()">기본정보 저장</button>
<button class="soft" onclick="loadSample()">예시 데이터 넣기</button>
</div>

<div class="card"><h2>② 오늘 기록하기</h2>
<label>날짜</label><input type="date" id="date">
<label>기록유형</label><select id="type"><option>작업일지</option><option>농약·비료</option><option>농자재</option><option>판매</option></select>
<label>내용</label><textarea id="content"></textarea>
<label>금액</label><input type="number" id="price">
<button class="green" onclick="saveRecord()">기록 저장</button>
<div id="recordList"></div>
</div>

<div class="card"><h2>③ 예약·주문 관리</h2>
<input type="hidden" id="editReserveIndex">
<label>구분</label><select id="reserveType"><option>직거래 주문</option><option>택배 주문</option><option>로컬푸드 납품</option><option>체험 예약</option><option>방문 수령 예약</option><option>교육·상담 예약</option><option>기타</option></select>
<label>예약일 / 수령일</label><input type="date" id="reserveDate">
<label>고객명</label><input id="customerName">
<label>연락처</label><input id="customerPhone">
<label>품목 / 체험명</label><input id="reserveItem">
<label>수량 / 인원</label><input id="reserveQty">
<label>금액</label><input type="number" id="reservePrice">
<label>상태</label><select id="reserveStatus"><option>접수</option><option>입금대기</option><option>입금완료</option><option>준비중</option><option>발송완료</option><option>방문예정</option><option>완료</option><option>취소</option></select>
<label>메모</label><textarea id="reserveMemo"></textarea>
<button class="green" onclick="saveReservation()">예약 저장</button>
<button class="soft" onclick="makeReserveMsg()">예약 안내문자</button>
<div id="reserveList"></div>
</div>

<div class="card"><h2>④ 날짜별 기록보기</h2>
<div class="calHeader"><button class="soft" onclick="moveMonth(-1)">이전</button><div id="monthTitle" class="monthTitle"></div><button class="soft" onclick="moveMonth(1)">다음</button></div>
<div id="calendar" class="calendar"></div><div id="selectedRecords" class="result">날짜를 누르면 그날 기록이 표시됩니다.</div>
</div>

<div class="card"><h2>⑤ AI 도우미</h2>
<button class="green" onclick="makePlan()">작업 체크리스트</button>
<button class="soft" onclick="makePest()">병해충 질문</button>
<button class="soft" onclick="makeCustomerMsg('delivery')">택배 발송 안내</button>
<button class="soft" onclick="makeCustomerMsg('thanks')">주문 감사 문자</button>
<button class="blue" onclick="copyAI()">AI 결과 복사</button>
<div id="aiResult" class="result">AI 결과가 여기에 표시됩니다.</div>
<div id="aiChecklist"></div>
</div>

<div class="card"><h2>⑥ 내 농장 정리</h2>
<button class="green" onclick="makeDiary()">영농일지 정리</button>
<button class="soft" onclick="makeReservationSummary()">예약·주문 요약</button>
<div id="reportResult" class="result">정리 결과가 여기에 표시됩니다.</div>
</div>
</div>

<script>
const S='aiFarmIphoneRecords', R='aiFarmIphoneReserve', P='aiFarmIphoneProfile';
let records=JSON.parse(localStorage.getItem(S)||'[]');
let reservations=JSON.parse(localStorage.getItem(R)||'[]');
let currentText='', selectedDate=new Date().toISOString().slice(0,10), viewDate=new Date();
date.value=selectedDate; reserveDate.value=selectedDate;
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));}
function saveProfile(){localStorage.setItem(P,JSON.stringify({farmName:farmName.value,crop:crop.value,memo:memo.value}));alert('저장되었습니다.')}
function loadProfile(){let p=JSON.parse(localStorage.getItem(P)||'null');if(p){farmName.value=p.farmName||'';crop.value=p.crop||'딸기';memo.value=p.memo||''}}
function save(){localStorage.setItem(S,JSON.stringify(records))}
function saveR(){localStorage.setItem(R,JSON.stringify(reservations))}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function render(){renderRecords();renderReservations();renderCalendar();renderSelectedRecords()}
function renderRecords(){recordList.innerHTML='';records.slice().reverse().forEach(r=>{let d=document.createElement('div');d.className='record';d.innerHTML='<b>'+r.date+' / '+r.type+'</b><br>'+esc(r.content)+(r.price?'<br>'+Number(r.price).toLocaleString()+'원':'');recordList.appendChild(d)})}
function saveRecord(){if(!content.value.trim()){alert('내용을 입력하세요.');return}records.push({date:date.value,type:type.value,content:content.value,price:price.value});save();selectedDate=date.value;content.value='';price.value='';render()}
function getRes(){return{reserveType:reserveType.value,reserveDate:reserveDate.value,customerName:customerName.value,customerPhone:customerPhone.value,reserveItem:reserveItem.value,reserveQty:reserveQty.value,reservePrice:reservePrice.value,reserveStatus:reserveStatus.value,reserveMemo:reserveMemo.value}}
function setRes(r){reserveType.value=r.reserveType||'직거래 주문';reserveDate.value=r.reserveDate||date.value;customerName.value=r.customerName||'';customerPhone.value=r.customerPhone||'';reserveItem.value=r.reserveItem||'';reserveQty.value=r.reserveQty||'';reservePrice.value=r.reservePrice||'';reserveStatus.value=r.reserveStatus||'접수';reserveMemo.value=r.reserveMemo||''}
function saveReservation(){if(!customerName.value.trim()){alert('고객명을 입력하세요.');return}let idx=editReserveIndex.value;if(idx!==''){reservations[Number(idx)]=getRes()}else{reservations.push(getRes())}saveR();editReserveIndex.value='';setRes({});render()}
function editReservation(i){editReserveIndex.value=i;setRes(reservations[i]);window.scrollTo(0,0)}
function deleteReservation(i){if(confirm('삭제할까요?')){reservations.splice(i,1);saveR();render()}}
function completeReservation(i){reservations[i].reserveStatus='완료';saveR();render()}
function renderReservations(){reserveList.innerHTML='';reservations.slice().reverse().forEach((r,ri)=>{let i=reservations.length-1-ri;let d=document.createElement('div');d.className='record reserve';d.innerHTML='<b>'+r.reserveDate+' / '+r.reserveType+' / '+r.reserveStatus+'</b><br>'+esc(r.customerName)+' / '+esc(r.reserveItem)+'<br>수량: '+esc(r.reserveQty)+(r.reservePrice?'<br>'+Number(r.reservePrice).toLocaleString()+'원':'')+'<div class="actionRow"><button class="soft" onclick="editReservation('+i+')">수정</button><button class="soft" onclick="completeReservation('+i+')">완료</button><button class="red" onclick="deleteReservation('+i+')">삭제</button></div>';reserveList.appendChild(d)})}
function info(){return{farm:farmName.value||'우리 농장',crop:crop.value,memo:memo.value}}
function setAI(t){currentText=t;aiResult.innerText=t}
function makePlan(){let x=info();let items=['병해충 예찰','관수상태 확인','생육상태 기록','판매·출하 물량 확인'];setAI('['+x.crop+' 작업 체크리스트]\\n\\n'+items.map(i=>'☐ '+i).join('\\n'));let html='<div class="checkboxBox">';items.forEach(i=>html+='<label class="checkItem"><input type="checkbox"><span>'+i+'</span></label>');html+='</div>';aiChecklist.innerHTML=html}
function makePest(){let x=info();setAI('첨부한 '+x.crop+' 사진을 보고 병해충 또는 생육 이상 여부를 분석해줘.\\n\\n특이사항: '+(x.memo||'없음')+'\\n\\n1. 의심 증상\\n2. 원인 가능성\\n3. 관리방향');aiChecklist.innerHTML=''}
function makeCustomerMsg(t){let x=info(); if(t==='delivery')setAI('[택배 발송 안내]\\n\\n안녕하세요. '+x.farm+'입니다. 주문하신 '+x.crop+'를 오늘 발송했습니다. 신선하게 받아보실 수 있도록 꼼꼼히 포장했습니다. 감사합니다.'); if(t==='thanks')setAI('[주문 감사 문자]\\n\\n안녕하세요. '+x.farm+'입니다. 주문해주셔서 감사합니다. 좋은 품질의 '+x.crop+'로 보답드리겠습니다.')}
function makeReserveMsg(){let t='[예약 안내 문자]\\n\\n'+(customerName.value||'고객')+'님 안녕하세요.\\n'+reserveDate.value+' '+reserveType.value+'이 접수되었습니다.\\n예약 내용: '+reserveItem.value+' / '+reserveQty.value+'\\n감사합니다.';setAI(t);navigator.clipboard?.writeText(t)}
function copyAI(){navigator.clipboard?.writeText(aiResult.innerText);alert('복사되었습니다.')}
function makeDiary(){let t='[영농일지]\\n\\n';records.forEach(r=>t+='- '+r.date+' / '+r.type+' / '+r.content+(r.price?' / '+Number(r.price).toLocaleString()+'원':'')+'\\n');currentText=t;reportResult.innerText=t}
function makeReservationSummary(){let t='[예약·주문 요약]\\n\\n';reservations.forEach(r=>t+='- '+r.reserveDate+' / '+r.reserveType+' / '+r.customerName+' / '+r.reserveItem+' / '+r.reserveStatus+'\\n');currentText=t;reportResult.innerText=t}
function renderCalendar(){calendar.innerHTML='';let y=viewDate.getFullYear(),m=viewDate.getMonth();monthTitle.innerText=y+'년 '+(m+1)+'월';['일','월','화','수','목','금','토'].forEach(d=>{let div=document.createElement('div');div.className='dow';div.innerText=d;calendar.appendChild(div)});let first=new Date(y,m,1),last=new Date(y,m+1,0);for(let i=0;i<first.getDay();i++){let e=document.createElement('div');e.className='day empty';calendar.appendChild(e)}for(let d=1;d<=last.getDate();d++){let ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');let list=records.filter(r=>r.date===ds),res=reservations.filter(r=>r.reserveDate===ds);let div=document.createElement('div');div.className='day';if(ds===selectedDate)div.classList.add('selected');let dots='';if(list.length)dots+='<span class="dot"></span>';if(res.length)dots+='<span class="dot sale"></span>';div.innerHTML='<div class="dayNum">'+d+'</div><div>'+dots+'</div><div>'+(list.length+res.length?list.length+res.length+'건':'')+'</div>';div.onclick=()=>{selectedDate=ds;date.value=ds;reserveDate.value=ds;renderCalendar();renderSelectedRecords()};calendar.appendChild(div)}}
function moveMonth(n){viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+n,1);renderCalendar()}
function renderSelectedRecords(){let list=records.filter(r=>r.date===selectedDate),res=reservations.filter(r=>r.reserveDate===selectedDate);if(!list.length&&!res.length){selectedRecords.innerText=selectedDate+' 기록 없음';return}let t='['+selectedDate+' 기록]\\n\\n';list.forEach(r=>t+='- '+r.type+' / '+r.content+'\\n');res.forEach(r=>t+='- 예약·주문 / '+r.reserveType+' / '+r.customerName+' / '+r.reserveItem+' / '+r.reserveStatus+'\\n');selectedRecords.innerText=t}
function loadSample(){farmName.value='청년딸기농장';memo.value='판매기록과 예약관리 필요';records=[{date:'2026-05-24',type:'작업일지',content:'유인작업',price:''},{date:'2026-05-25',type:'농자재',content:'포장박스 구입',price:'55000'}];reservations=[{reserveType:'택배 주문',reserveDate:'2026-05-28',customerName:'김민지',customerPhone:'010-0000-0000',reserveItem:'딸기 2kg',reserveQty:'2박스',reservePrice:'60000',reserveStatus:'입금대기',reserveMemo:''}];save();saveR();selectedDate='2026-05-28';viewDate=new Date(2026,4,1);render()}
loadProfile();render();
</script>
</body>
</html>
